<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedbox Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111417;--surface:#1A1E21;--surface2:#222629;--card:#1E2326;
  --border:rgba(255,255,255,.07);--text:#E8EAEC;--t2:#9AA3AB;--t3:#5A6369;
  --teal:#65D5C4;--teal-dk:#4BBFAF;--danger:#EF4444;--warn:#F59E0B;
  --green:#22C55E;--purple:#8B5CF6;--r:10px;
}
html,body{height:100%;font-family:'DM Sans','Inter',system-ui,sans-serif;background:var(--bg);
  color:var(--text);-webkit-font-smoothing:antialiased;overflow:hidden}

/* ── LAYOUT ──────────────────────────────────────────── */
#app{display:flex;height:100vh}

/* Sidebar */
.sb{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);
    display:flex;flex-direction:column;padding:20px 12px}
.sb-logo{display:flex;align-items:center;gap:9px;padding:4px 8px;margin-bottom:24px}
.sb-logo-mark{width:28px;height:28px;background:var(--teal);border-radius:7px;
               display:flex;align-items:center;justify-content:center;
               font-size:13px;font-weight:800;color:#111417;flex-shrink:0}
.sb-title{font-size:14px;font-weight:700;color:var(--text)}
.sb-subtitle{font-size:10px;color:var(--t3);letter-spacing:.05em;text-transform:uppercase}
.sb-nav{display:flex;flex-direction:column;gap:2px;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;
          cursor:pointer;font-size:13px;font-weight:500;color:var(--t2);
          border:none;background:transparent;text-align:left;width:100%;
          transition:all .12s;font-family:inherit}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:rgba(101,213,196,.1);color:var(--teal)}
.nav-item svg{flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.nav-divider{height:1px;background:var(--border);margin:10px 0}
.sb-footer{padding:10px 8px;border-top:1px solid var(--border)}
.sb-user{font-size:11px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:8px}
.btn-logout{width:100%;padding:7px;border-radius:7px;border:1px solid var(--border);
            background:transparent;color:var(--t2);font-size:12px;cursor:pointer;
            font-family:inherit;transition:all .12s}
.btn-logout:hover{border-color:var(--danger);color:var(--danger)}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:52px;padding:0 24px;border-bottom:1px solid var(--border);
        display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:16px;font-weight:700;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:10px}
.refresh-btn{padding:6px 14px;border-radius:7px;border:1px solid var(--border);
             background:transparent;color:var(--t2);font-size:12px;cursor:pointer;
             font-family:inherit;transition:all .12s;display:flex;align-items:center;gap:6px}
.refresh-btn:hover{border-color:var(--teal);color:var(--teal)}
.last-updated{font-size:11px;color:var(--t3)}
.content{flex:1;overflow-y:auto;padding:24px}

/* ── SECTIONS ─────────────────────────────────────────── */
.section{display:none}
.section.active{display:block}

/* ── CARDS & GRIDS ────────────────────────────────────── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
     padding:18px 20px}
.kpi-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
           color:var(--t3);margin-bottom:8px}
.kpi-value{font-size:32px;font-weight:800;line-height:1;letter-spacing:-.02em}
.kpi-sub{font-size:11px;color:var(--t3);margin-top:5px}
.kpi-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;
           padding:2px 7px;border-radius:20px;margin-top:6px}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
      overflow:hidden;margin-bottom:16px}
.card-header{padding:14px 18px;border-bottom:1px solid var(--border);
             display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;
            letter-spacing:.08em;color:var(--t2)}
.card-body{padding:18px}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}

/* ── BAR CHART ────────────────────────────────────────── */
.bar-chart{display:flex;align-items:flex-end;gap:3px;height:80px;padding:0 2px}
.bar{flex:1;border-radius:3px 3px 0 0;min-height:2px;transition:height .3s ease;cursor:default}
.bar-axis{display:flex;justify-content:space-between;margin-top:6px;
          font-size:10px;color:var(--t3)}

/* ── TABLE ────────────────────────────────────────────── */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;
        letter-spacing:.07em;color:var(--t3);padding:8px 14px;
        border-bottom:1px solid var(--border)}
.tbl td{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.03);
        color:var(--t2);vertical-align:middle}
.tbl tr:last-child td{border:none}
.tbl tr:hover td{background:rgba(255,255,255,.02)}
.tbl td.mono{font-family:monospace;font-size:12px;color:var(--text)}

/* ── BADGES ───────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;
       padding:2px 8px;border-radius:20px;letter-spacing:.04em}
.badge-pro{background:rgba(101,213,196,.15);color:var(--teal)}
.badge-free{background:rgba(255,255,255,.06);color:var(--t3)}
.badge-up{background:rgba(34,197,94,.12);color:var(--green)}
.badge-down{background:rgba(239,68,68,.12);color:var(--danger)}
.badge-warn{background:rgba(245,158,11,.12);color:var(--warn)}

/* ── FUNNEL ───────────────────────────────────────────── */
.funnel-row{display:flex;align-items:center;gap:14px;padding:12px 18px;
            border-bottom:1px solid var(--border)}
.funnel-row:last-child{border:none}
.funnel-label{flex:1;font-size:13px;color:var(--text)}
.funnel-count{font-size:18px;font-weight:800;width:60px;text-align:right}
.funnel-pct{font-size:11px;color:var(--t3);width:44px;text-align:right}
.funnel-bar-wrap{width:120px;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.funnel-bar{height:100%;border-radius:3px;transition:width .4s ease}

/* ── EVENT LIST ───────────────────────────────────────── */
.event-row{display:flex;align-items:center;gap:12px;padding:9px 14px;
           border-bottom:1px solid rgba(255,255,255,.03)}
.event-row:last-child{border:none}
.event-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.event-name{font-size:12px;font-family:monospace;color:var(--text);flex:1;min-width:0;
            white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.event-email{font-size:11px;color:var(--t3);min-width:0;overflow:hidden;
             text-overflow:ellipsis;white-space:nowrap;max-width:180px}
.event-time{font-size:11px;color:var(--t3);flex-shrink:0}

/* ── STAT ROW ─────────────────────────────────────────── */
.event-count-row{display:flex;align-items:center;gap:10px;padding:9px 14px;
                 border-bottom:1px solid rgba(255,255,255,.03)}
.event-count-row:last-child{border:none}
.event-count-name{font-size:12px;font-family:monospace;color:var(--text);flex:1}
.event-count-n{font-size:13px;font-weight:700;color:var(--teal);width:50px;text-align:right}
.event-count-bar{flex:1;max-width:140px;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden}
.event-count-fill{height:100%;background:var(--teal);border-radius:3px;opacity:.6}

/* ── SPINNER ──────────────────────────────────────────── */
.spinner{display:flex;justify-content:center;align-items:center;padding:60px 0}
.spin{width:28px;height:28px;border:2.5px solid var(--border);
      border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── LOGIN ────────────────────────────────────────────── */
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;
              align-items:center;justify-content:center;z-index:100}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;
           padding:36px;width:360px;text-align:center}
.login-logo{width:40px;height:40px;background:var(--teal);border-radius:10px;
            display:flex;align-items:center;justify-content:center;
            font-size:18px;font-weight:800;color:#111417;margin:0 auto 18px}
.login-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:6px}
.login-sub{font-size:13px;color:var(--t3);margin-bottom:28px}
.login-input{width:100%;padding:11px 14px;border-radius:8px;border:1px solid var(--border);
             background:var(--surface2);color:var(--text);font-size:14px;
             font-family:inherit;outline:none;margin-bottom:10px;
             transition:border-color .15s}
.login-input:focus{border-color:var(--teal)}
.login-btn{width:100%;padding:12px;border-radius:8px;border:none;
           background:var(--teal);color:#111417;font-size:14px;font-weight:700;
           cursor:pointer;font-family:inherit;transition:all .15s;margin-bottom:10px}
.login-btn:hover{background:#7ADDD0}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.login-msg{font-size:12px;color:var(--t3);min-height:18px}
.login-msg.ok{color:var(--teal)}
.login-msg.err{color:var(--danger)}

/* ── EMPTY ────────────────────────────────────────────── */
.empty{padding:40px;text-align:center;color:var(--t3);font-size:13px}
</style>
</head>
<body>

<!-- Login screen -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">F</div>
    <div class="login-title">Feedbox Admin</div>
    <div class="login-sub">Sign in with your admin account</div>
    <input id="login-email" class="login-input" type="email" placeholder="you@example.com" />
    <input id="login-pass" class="login-input" type="password" placeholder="Password" />
    <button id="login-btn" class="login-btn">Sign in</button>
    <div id="login-msg" class="login-msg"></div>
  </div>
</div>

<!-- Main app -->
<div id="app" style="display:none">
  <div class="sb">
    <div class="sb-logo">
      <div class="sb-logo-mark">F</div>
      <div>
        <div class="sb-title">Feedbox</div>
        <div class="sb-subtitle">Admin</div>
      </div>
    </div>

    <nav class="sb-nav">
      <button class="nav-item active" data-section="overview">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/></svg>
        Overview
      </button>
      <button class="nav-item" data-section="users">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="5" r="3"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg>
        Users
      </button>
      <button class="nav-item" data-section="subscriptions">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="1" y="3" width="14" height="10" rx="2"/><path d="M1 7h14"/><path d="M4 11h3"/></svg>
        Subscriptions
      </button>
      <button class="nav-item" data-section="analytics">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 12l3.5-4 3 3L12 6l2 2"/></svg>
        Analytics
      </button>
      <button class="nav-item" data-section="activity">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M8 1v5l3 3"/><circle cx="8" cy="8" r="6.5"/></svg>
        Activity
      </button>
    </nav>

    <div class="sb-footer">
      <div class="sb-user" id="admin-email">—</div>
      <button class="btn-logout" id="logout-btn">Sign out</button>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="section-title">Overview</div>
      <div class="topbar-right">
        <div class="last-updated" id="last-updated"></div>
        <button class="refresh-btn" id="refresh-btn">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M13.5 2.5A6.5 6.5 0 1 1 8 1.5"/><path d="M14 1v4h-4"/></svg>
          Refresh
        </button>
      </div>
    </div>

    <div class="content">
      <!-- OVERVIEW -->
      <div id="section-overview" class="section active">
        <div class="kpi-grid" id="kpi-grid"><div class="spinner"><div class="spin"></div></div></div>
        <div class="two-col">
          <div class="card" id="dau-chart-card">
            <div class="card-header"><div class="card-title">Daily active users — 30 days</div></div>
            <div class="card-body" id="dau-chart-body"><div class="spinner"><div class="spin"></div></div></div>
          </div>
          <div class="card" id="funnel-card">
            <div class="card-header"><div class="card-title">Upgrade funnel — 30 days</div></div>
            <div id="funnel-body"><div class="spinner"><div class="spin"></div></div></div>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title">Recent signups</div></div>
          <div id="recent-signups"></div>
        </div>
      </div>

      <!-- USERS -->
      <div id="section-users" class="section">
        <div class="three-col" id="user-kpis"></div>
        <div class="card">
          <div class="card-header"><div class="card-title">All users</div><div id="user-count" style="font-size:11px;color:var(--t3)"></div></div>
          <div style="overflow-x:auto"><table class="tbl" id="users-table"><thead><tr><th>Email</th><th>Plan</th><th>Signed up</th><th>Last seen</th></tr></thead><tbody></tbody></table></div>
        </div>
      </div>

      <!-- SUBSCRIPTIONS -->
      <div id="section-subscriptions" class="section">
        <div class="three-col" id="sub-kpis"></div>
        <div class="card">
          <div class="card-header"><div class="card-title">Subscription events — 30 days</div></div>
          <div style="overflow-x:auto"><table class="tbl" id="sub-events-table"><thead><tr><th>Email</th><th>Event</th><th>Plan</th><th>Date</th></tr></thead><tbody></tbody></table></div>
        </div>
      </div>

      <!-- ANALYTICS -->
      <div id="section-analytics" class="section">
        <div class="three-col" id="analytics-kpis"></div>
        <div class="two-col">
          <div class="card">
            <div class="card-header"><div class="card-title">Top events — 30 days</div></div>
            <div id="top-events-body"></div>
          </div>
          <div class="card">
            <div class="card-header"><div class="card-title">Events per day — 30 days</div></div>
            <div class="card-body" id="events-chart-body"></div>
          </div>
        </div>
      </div>

      <!-- ACTIVITY -->
      <div id="section-activity" class="section">
        <div class="card">
          <div class="card-header"><div class="card-title">Recent activity feed</div></div>
          <div id="activity-feed"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────
const SUPABASE_URL  = "https://nmkwbsmdskqqgzsdxray.supabase.co";
const SUPABASE_ANON = "sb_publishable_AssEJ7QqgKD1ChcedMfUrw_iEy2cYY1";
const ADMIN_FN_URL  = `${SUPABASE_URL}/functions/v1/admin-stats`;

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ── State ─────────────────────────────────────────────────────
let dashData = null;

// ── Auth ──────────────────────────────────────────────────────
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session?.user?.user_metadata?.is_admin) {
    showApp(session.user);
  } else if (session) {
    setLoginMsg("This account does not have admin access.", true);
  }
}

async function login() {
  const email = document.getElementById("login-email").value.trim();
  const pass  = document.getElementById("login-pass").value;
  const btn   = document.getElementById("login-btn");
  if (!email || !pass) return;
  btn.disabled = true;
  setLoginMsg("Signing in…");
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) { setLoginMsg(error.message, true); btn.disabled = false; return; }
  if (!data.user?.user_metadata?.is_admin) {
    await sb.auth.signOut();
    setLoginMsg("This account does not have admin access.", true);
    btn.disabled = false;
    return;
  }
  showApp(data.user);
}

function setLoginMsg(msg, isErr = false) {
  const el = document.getElementById("login-msg");
  el.textContent = msg;
  el.className = "login-msg" + (isErr ? " err" : " ok");
}

function showApp(user) {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app").style.display = "flex";
  document.getElementById("admin-email").textContent = user.email;
  loadDashboard();
}

document.getElementById("login-btn").addEventListener("click", login);
document.getElementById("login-pass").addEventListener("keydown", e => { if (e.key === "Enter") login(); });
document.getElementById("logout-btn").addEventListener("click", async () => {
  await sb.auth.signOut();
  location.reload();
});
document.getElementById("refresh-btn").addEventListener("click", loadDashboard);

// ── Navigation ────────────────────────────────────────────────
const TITLES = { overview:"Overview", users:"Users", subscriptions:"Subscriptions", analytics:"Analytics", activity:"Activity" };
document.querySelectorAll(".nav-item").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".nav-item").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    btn.classList.add("active");
    const sec = btn.dataset.section;
    document.getElementById(`section-${sec}`).classList.add("active");
    document.getElementById("section-title").textContent = TITLES[sec];
  });
});

// ── Data loading ──────────────────────────────────────────────
async function loadDashboard() {
  document.getElementById("refresh-btn").querySelector("svg").style.animation = "spin .7s linear infinite";
  const { data: { session } } = await sb.auth.getSession();
  const res = await fetch(ADMIN_FN_URL, {
    headers: { "Authorization": `Bearer ${session.access_token}`, "Content-Type": "application/json" }
  });
  const data = await res.json();
  dashData = data;
  document.getElementById("refresh-btn").querySelector("svg").style.animation = "";
  document.getElementById("last-updated").textContent = "Updated " + new Date().toLocaleTimeString();
  renderAll(data);
}

// ── Render helpers ────────────────────────────────────────────
function fmt(n) { return typeof n === "number" ? n.toLocaleString() : (n || "—"); }
function relTime(iso) {
  if (!iso) return "—";
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000), h = Math.floor(m / 60), d = Math.floor(h / 24);
  if (d > 30) return new Date(iso).toLocaleDateString();
  if (d > 0) return `${d}d ago`;
  if (h > 0) return `${h}h ago`;
  if (m > 0) return `${m}m ago`;
  return "just now";
}
function fmtDate(iso) {
  if (!iso) return "—";
  return new Date(iso).toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" });
}

function kpiCard(label, value, sub, color) {
  return `<div class="kpi">
    <div class="kpi-label">${label}</div>
    <div class="kpi-value" style="color:${color||"var(--text)"}">${fmt(value)}</div>
    ${sub ? `<div class="kpi-sub">${sub}</div>` : ""}
  </div>`;
}

function barChart(data, color) {
  const max = Math.max(1, ...data.map(d => d.count));
  const bars = data.map(d =>
    `<div class="bar" style="height:${Math.max(2,(d.count/max)*100)}%;background:${color||"var(--teal)"};opacity:${d.count>0?0.8:0.15}" title="${d.day}: ${d.count}"></div>`
  ).join("");
  const first = data[0]?.day?.slice(5) || "";
  const last  = data[data.length-1]?.day?.slice(5) || "";
  return `<div class="bar-chart">${bars}</div><div class="bar-axis"><span>${first}</span><span>${last}</span></div>`;
}

function eventDot(event) {
  const colors = {
    article_opened:"var(--teal)", ai_summary_triggered:"var(--purple)",
    upgrade_initiated:"var(--green)", plan_limit_hit:"var(--danger)",
    feed_added:"var(--warn)", article_highlighted:"#2F6FED",
    search_performed:"#EC4899",
  };
  return colors[event] || "var(--t3)";
}

// ── Render all ────────────────────────────────────────────────
function renderAll(d) {
  renderOverview(d);
  renderUsers(d.users);
  renderSubscriptions(d.subscriptions);
  renderAnalytics(d.analytics);
  renderActivity(d.recentActivity);
}

function renderOverview(d) {
  const { users: u, subscriptions: s, analytics: a } = d;

  // KPIs
  document.getElementById("kpi-grid").innerHTML = [
    kpiCard("Total users",   u.totalUsers,   `${u.proUsers} pro · ${u.freeUsers} free`, "var(--text)"),
    kpiCard("MRR",           `$${fmt(u.mrr)}`, `${u.proUsers} × $9`,                   "var(--teal)"),
    kpiCard("DAU",           a.uniqueUsersToday, "Active today",                       "var(--text)"),
    kpiCard("New this week", u.newUsers7d,    `${u.newUsers30d} this month`,            "var(--green)"),
  ].join("");

  // DAU chart
  document.getElementById("dau-chart-body").innerHTML = barChart(a.dauChart);

  // Funnel
  const limitHits  = a.funnel.limitHits;
  const upgraded   = a.funnel.upgradeClicked;
  const converted  = a.funnel.upgrades;
  const maxVal     = Math.max(1, limitHits);
  function funnelRow(label, count, color, top) {
    const pct = top ? null : Math.round((count / Math.max(1, top)) * 100);
    return `<div class="funnel-row">
      <div class="funnel-label">${label}</div>
      <div class="funnel-count" style="color:${color}">${fmt(count)}</div>
      <div class="funnel-pct">${pct !== null ? pct + "%" : ""}</div>
      <div class="funnel-bar-wrap"><div class="funnel-bar" style="width:${Math.round((count/maxVal)*100)}%;background:${color}"></div></div>
    </div>`;
  }
  document.getElementById("funnel-body").innerHTML =
    funnelRow("Hit a plan limit",    limitHits, "var(--danger)",  null) +
    funnelRow("Clicked upgrade",     upgraded,  "var(--warn)",    limitHits) +
    funnelRow("Completed checkout",  converted, "var(--green)",   upgraded);

  // Recent signups
  const rows = (u.recentUsers || []).slice(0, 8).map(u => `
    <tr>
      <td class="mono">${u.email || "—"}</td>
      <td><span class="badge ${u.plan==="pro"?"badge-pro":"badge-free"}">${u.plan}</span></td>
      <td>${fmtDate(u.created_at)}</td>
      <td>${relTime(u.last_sign_in)}</td>
    </tr>`).join("");
  document.getElementById("recent-signups").innerHTML =
    `<div style="overflow-x:auto"><table class="tbl"><thead><tr><th>Email</th><th>Plan</th><th>Signed up</th><th>Last seen</th></tr></thead><tbody>${rows||'<tr><td colspan="4" class="empty">No users yet</td></tr>'}</tbody></table></div>`;
}

function renderUsers(u) {
  document.getElementById("user-kpis").innerHTML = [
    kpiCard("Total",      u.totalUsers,  null,            "var(--text)"),
    kpiCard("Pro",        u.proUsers,    `$${fmt(u.mrr)} MRR`, "var(--teal)"),
    kpiCard("New (30d)",  u.newUsers30d, `${u.newUsers7d} this week`, "var(--green)"),
  ].join("");

  document.getElementById("user-count").textContent = `${u.totalUsers} total`;
  const rows = (u.recentUsers || []).map(usr => `
    <tr>
      <td class="mono">${usr.email || "—"}</td>
      <td><span class="badge ${usr.plan==="pro"?"badge-pro":"badge-free"}">${usr.plan}</span></td>
      <td>${fmtDate(usr.created_at)}</td>
      <td>${relTime(usr.last_sign_in)}</td>
    </tr>`).join("");
  document.querySelector("#users-table tbody").innerHTML =
    rows || '<tr><td colspan="4" class="empty">No users yet</td></tr>';
}

function renderSubscriptions(s) {
  document.getElementById("sub-kpis").innerHTML = [
    kpiCard("Upgrades (30d)",     s.upgrades30d,     null, "var(--green)"),
    kpiCard("Cancellations (30d)",s.cancellations30d,null, "var(--danger)"),
    kpiCard("Net (30d)", s.upgrades30d - s.cancellations30d, null,
      (s.upgrades30d - s.cancellations30d) >= 0 ? "var(--teal)" : "var(--danger)"),
  ].join("");

  const rows = (s.recentSubEvents || []).map(e => `
    <tr>
      <td class="mono">${e.email || "—"}</td>
      <td><span class="badge ${e.event==="upgraded"?"badge-up":"badge-down"}">${e.event}</span></td>
      <td><span class="badge ${e.plan==="pro"?"badge-pro":"badge-free"}">${e.plan}</span></td>
      <td>${relTime(e.created_at)}</td>
    </tr>`).join("");
  document.querySelector("#sub-events-table tbody").innerHTML =
    rows || '<tr><td colspan="4" class="empty">No subscription events yet</td></tr>';
}

function renderAnalytics(a) {
  document.getElementById("analytics-kpis").innerHTML = [
    kpiCard("Events (30d)",   a.totalEvents,    null,                     "var(--text)"),
    kpiCard("MAU",            a.uniqueUsers30d, "Unique users",           "var(--teal)"),
    kpiCard("WAU / DAU",      `${a.uniqueUsers7d} / ${a.uniqueUsersToday}`, null, "var(--text)"),
  ].join("");

  // Top events
  const maxCount = a.topEvents[0]?.count || 1;
  const evRows = (a.topEvents || []).map(e => `
    <div class="event-count-row">
      <div class="event-count-name">${e.event}</div>
      <div class="event-count-n">${fmt(e.count)}</div>
      <div class="event-count-bar"><div class="event-count-fill" style="width:${Math.round((e.count/maxCount)*100)}%"></div></div>
    </div>`).join("");
  document.getElementById("top-events-body").innerHTML = evRows || '<div class="empty">No events yet</div>';

  // Events chart (daily total)
  document.getElementById("events-chart-body").innerHTML = barChart(
    a.dauChart.map((d, i) => ({ day: d.day, count: a.dauChart[i]?.count || 0 })),
    "var(--warn)"
  );
}

function renderActivity(activity) {
  const rows = (activity || []).map(r => `
    <div class="event-row">
      <div class="event-dot" style="background:${eventDot(r.event)}"></div>
      <div class="event-name">${r.event}</div>
      <div class="event-email">${r.user_email || "anonymous"}</div>
      <div class="event-time">${relTime(r.created_at)}</div>
    </div>`).join("");
  document.getElementById("activity-feed").innerHTML =
    rows || '<div class="empty">No activity yet</div>';
}

// ── Boot ──────────────────────────────────────────────────────
init();
</script>
</body>
</html>
